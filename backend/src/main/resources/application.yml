spring:
  application:
    name: finance-tracker

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

app:
  jwt:
    secret: ${JWT_SECRET:default-dev-secret-change-in-production-this-must-be-at-least-256-bits}
    expiration-ms: 86400000
  scheduling:
    recurring-transactions-cron: ${RECURRING_TRANSACTIONS_CRON:0 0 1 * * *}
    budget-cycles-cron: ${BUDGET_CYCLES_CRON:0 10 1 * * *}
